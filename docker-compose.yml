
version: "3.9"

services:
  api:
    build: .
    container_name: fastapi_api
    restart: always
    expose:
      - "8000"

    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.app:app --host 0.0.0.0 --port 8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_DB: fast_db
      POSTGRES_USER: fast_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

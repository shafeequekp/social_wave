# Local development overrides only.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# Production stays unchanged: docker compose up --build

services:
  api:
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    depends_on:
      api:
        condition: service_healthy
